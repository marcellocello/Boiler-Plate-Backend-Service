# ==========================================================
# Docker Compose -- DEVELOPMENT ONLY
# Hanya untuk menjalankan database di laptop local developer.
# App Node.js dijalankan langsung (npm run dev), bukan di Docker.

# Usage:
#   MySQL only                  -> docker compose --profile mysql up -d
#   MySQL + MongoDB             -> docker compose --profile mysql --profile mongo up -d
#   Semua database              -> docker compose --profile mysql --profile mongo --profile postgres up -d
#   Stop semua                  -> docker compose down --prorile nama_profile
#   Stop semua + hapus volume   -> docker compose down --prorile nama_profile -v
# ==========================================================

services:
  mysql:
    image: mysql:8.0
    profiles: ["mysql"]
    container_name: app_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app-db}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    profiles: ["mongo"]
    container_name: app_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-app_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  postgres_data:
  mongo_data: